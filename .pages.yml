media: media
content:
  - name: site
    label: Site settings
    type: file
    path: src/_data/site.json
    fields:
     - name: title
       type: string
     - name: description
       type: text
     - name: url
       type: string
  - name: pages
    label: Pages
    type: collection
    path: docs
    fields:
      - name: title
        type: string
      - name: author
        type: string
      - name: categories
        type: string
        list: true
      - name: body
        type: rich-text
      - name: cover
        label: Cover image
        type: image